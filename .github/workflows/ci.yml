name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  harness-gate:
    # Fails when a changed crates/** path has no owner in harness-ownership.toml,
    # or when the public Rust API / PyO3 binding changed without the Python
    # surface (.pyi / shim / docs). Bypass a single change with [skip-harness]
    # in the commit message. Same code path as the in-session Stop hook.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Determine base ref
      id: base
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
        else
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          echo "ref=$BEFORE" >> "$GITHUB_OUTPUT"
        fi

    - name: Harness sync gate
      run: cargo xtask harness-gate --base "${{ steps.base.outputs.ref }}"

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    # NOTE: this job installs upstream `linkml` + `linkml-map` on purpose — it
    # runs the UPSTREAM-REFERENCE compliance suite (tests/compliance/
    # test_compliance_suite.py imports linkml_map.compiler/.datamodel/.inference,
    # which only upstream provides). The PyO3 wheel is built here for packaging,
    # but the binding surface is proven separately in the `python-compat` job
    # below, which must NOT co-install upstream. Do not conflate the two.
    - name: Install Python dependencies
      run: |
        uv pip install pytest linkml-runtime pyyaml deepdiff linkml linkml-map --system

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    # Sanctioned no-Python-env fallback: linkml-map-py is excluded here and gets
    # its real coverage from the `python-compat` job.
    - name: Run Rust workspace tests
      run: cargo test --workspace --exclude linkml-map-py

    - name: Build Python wheels
      uses: PyO3/maturin-action@v1
      with:
        command: build
        args: --release --out dist -m crates/linkml-map-py/Cargo.toml

    - name: Install Python bindings
      run: |
        uv pip install dist/*.whl --system

    - name: Run upstream-reference compliance tests
      run: |
        pytest tests/compliance/test_compliance_suite.py

  # ───────────────────────────────────────────────────────────────────────────
  # Drop-in Python API compatibility of the PyO3 bindings.
  #
  # This job is the ONLY thing in CI that actually exercises the compiled
  # `linkml_map_rs` wheel + the Rust-backed `linkml_map` shim. It builds the
  # wheel, installs it into a CLEAN environment, and drives it through the
  # byte-identical-to-Python golden corpus (crates/linkml-map-py/tests/
  # test_compat_api.py). If the PyO3 surface drifts, this job fails the build.
  #
  # LOAD-BEARING INVARIANT — DO NOT "helpfully" add `linkml` or `linkml-map` to
  # the pip install below. Upstream `linkml-map` also imports as `linkml_map`,
  # so co-installing it would make `import linkml_map` resolve to UPSTREAM
  # Python instead of this repo's Rust shim, and the wheel would silently NOT be
  # under test. The compat deps are EXACTLY: pytest pyyaml linkml-runtime.
  # (The test module also actively guards against upstream leaking in and will
  # skip the whole module if it detects upstream's compiler/datamodel/inference
  # submodules — but keep this env clean regardless.)
  #
  # REQUIRED-CHECK NOTE: a GitHub check only *blocks merges* if a repo admin
  # adds it to the master branch-protection required-checks list. The check
  # names produced by this job are "python-compat (3.11)" and
  # "python-compat (3.12)" (job id `python-compat`, matrixed on python-version).
  # The YAML here only guarantees the job RUNS unconditionally on every PR and
  # FAILS on drift; it cannot make itself "required" — that is a branch-
  # protection setting.
  # ───────────────────────────────────────────────────────────────────────────
  python-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pyproject.toml declares requires-python = ">=3.8"; test the two most
        # commonly deployed in-range interpreters. Widen only if the wheel is
        # actually built/tested for more.
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    # EXACTLY the compat deps — NO upstream `linkml` / `linkml-map` here.
    # See the load-bearing invariant in the job comment above.
    - name: Install compat dependencies (NO upstream linkml-map)
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pyyaml linkml-runtime

    - name: Build the PyO3 wheel
      uses: PyO3/maturin-action@v1
      with:
        command: build
        args: --release --out dist -m crates/linkml-map-py/Cargo.toml

    - name: Install the wheel under test
      run: |
        python -m pip install dist/*.whl

    - name: Run PyO3 drop-in compat tests
      run: |
        pytest crates/linkml-map-py/tests/test_compat_api.py -v
