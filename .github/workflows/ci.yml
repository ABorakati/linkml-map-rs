name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup uv
      uses: astral-sh/setup-uv-action@v5
      with:
        enable-cache: true

    - name: Install Python dependencies
      run: |
        uv pip install pytest linkml-runtime pyyaml deepdiff linkml linkml-map --system

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Run Rust workspace tests
      run: cargo test --workspace --exclude linkml-map-py

    - name: Build Python wheels
      uses: PyO3/maturin-action@v1
      with:
        command: build
        args: --release --out dist -m crates/linkml-map-py/Cargo.toml

    - name: Install Python bindings
      run: |
        uv pip install dist/*.whl --system

    - name: Run Python compliance tests
      run: |
        pytest tests/compliance/test_compliance_suite.py

