name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install maturin pytest linkml-runtime pyyaml

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Run Rust workspace tests
      run: cargo test --workspace --exclude linkml-map-py

    - name: Build and install Python bindings
      run: |
        pip install ./crates/linkml-map-py

    - name: Run Python compliance tests
      run: |
        pytest tests/compliance/test_compliance_suite.py

