name: Auto-release

on:
  push:
    branches: [master]

jobs:
  bump-and-tag:
    # Skip the commit the bot itself makes (prevents infinite loop)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Bump patch version
        id: bump
        run: |
          git fetch --tags --force
          # Base the next version on the higher of: the current Cargo.toml
          # version and the highest existing release tag. This is self-healing
          # if a previous run left an orphan tag (tag pushed, bump commit not).
          OLD=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          LATEST=$(git tag --list 'v*' | sed 's/^v//' | sort -V | tail -1)
          BASE=$(printf '%s\n%s\n' "$OLD" "$LATEST" | sort -V | tail -1)
          NEW=$(echo "$BASE" | awk -F. '{print $1"."$2"."$3+1}')
          # Skip any version whose tag already exists.
          while git rev-parse -q --verify "refs/tags/v$NEW" >/dev/null; do
            NEW=$(echo "$NEW" | awk -F. '{print $1"."$2"."$3+1}')
          done
          sed -i "s/^version = \"$OLD\"/version = \"$NEW\"/" Cargo.toml
          cargo generate-lockfile
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Collect commit message
        id: notes
        run: |
          echo "msg<<EOF" >> "$GITHUB_OUTPUT"
          git log -1 --pretty=%B >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          # Atomic push: the tag is only created on the remote if the branch
          # push also succeeds, so a rejected branch push never orphans a tag.
          git push --atomic origin master "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass notes via env, not ${{ }} interpolation, so a commit message
          # containing quotes/backticks can't break the shell command.
          NOTES: ${{ steps.notes.outputs.msg }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --notes "$NOTES"
